<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Yıldız Yakalama 🌠</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; -webkit-user-select:none; user-select:none; touch-action:none; }
  body {
    font-family:'Comic Sans MS','Segoe UI',sans-serif;
    min-height:100vh; min-height:100dvh;
    background:linear-gradient(160deg,#0f1c4d 0%,#43337a 55%,#b06ce0 100%);
    color:#fff; display:flex; flex-direction:column; align-items:center; padding:12px;
  }
  .home-btn { position:fixed; top:10px; left:12px; z-index:8; border-radius:16px; padding:10px 16px;
    font-size:1.05rem; font-weight:bold; background:rgba(255,255,255,.92); color:#6b4a8a;
    box-shadow:0 4px 12px rgba(0,0,0,.2); text-decoration:none; font-family:inherit; touch-action:manipulation; }
  h1 { font-size:clamp(1.3rem,4.5vw,2rem); margin:42px 0 8px; text-shadow:0 3px 10px rgba(0,0,0,.4); }
  .hud { display:flex; gap:10px; margin-bottom:10px; flex-wrap:wrap; justify-content:center; }
  .hud div { background:rgba(255,255,255,.18); border-radius:14px; padding:8px 16px; font-weight:bold; }
  canvas { background:rgba(5,10,35,.5); border-radius:18px; box-shadow:0 8px 24px rgba(0,0,0,.35);
    width:min(94vw,420px); }
  #over { position:fixed; inset:0; background:rgba(15,5,40,.88); display:none; flex-direction:column;
    align-items:center; justify-content:center; z-index:10; text-align:center; padding:20px; }
  #over.show { display:flex; }
  #over h2 { font-size:2rem; margin-bottom:10px; }
  #over p { font-size:1.15rem; margin:4px 0; }
  #over button { margin-top:16px; border:none; border-radius:16px; padding:14px 32px; font-family:inherit;
    font-size:1.15rem; font-weight:bold; cursor:pointer; background:linear-gradient(135deg,#ffd93d,#ff9a3d); color:#5b3a00; touch-action:manipulation; }
  .hint { margin-top:8px; font-size:.9rem; opacity:.85; }
</style>
</head>
<body>
<a class="home-btn" href="index.html">🏠 Menü</a>
<h1>🌠 Yıldız Yakalama</h1>
<div class="hud">
  <div>⭐ Puan: <span id="score">0</span></div>
  <div>❤️ Can: <span id="lives">3</span></div>
  <div>🏆 Rekor: <span id="best">0</span></div>
</div>
<canvas id="cv" width="420" height="560"></canvas>
<div class="hint">Parmağınla unicornu sağa sola kaydır! ☄️ Meteorlardan kaç!</div>
<div id="over">
  <h2 id="overTitle">Oyun Bitti!</h2>
  <p>⭐ Puanın: <span id="finalScore">0</span></p>
  <p id="overMsg"></p>
  <button onclick="start()">🔄 Tekrar Oyna</button>
</div>
<script>
  const cv = document.getElementById("cv"), ctx = cv.getContext("2d");
  const W = cv.width, H = cv.height;
  let px = W/2, items = [], score = 0, lives = 3, best = 0, running = false;
  let spawnT = 0, spawnGap = 900, speedMul = 1, lastTs = 0, sparkles = [];

  try { best = +localStorage.getItem("yildizBest") || 0; } catch(e) {}
  document.getElementById("best").textContent = best;

  const MSGS = ["Gökyüzü senin avucunda! 🌌","Yıldız toplama şampiyonu: EYLÜL! 🏆","Unicorn seninle gurur duyuyor! 🦄"];
  const TYPES = [
    { e:"⭐", p:10, w:.55 }, { e:"💎", p:25, w:.2 }, { e:"🌟", p:15, w:.1 }, { e:"☄️", p:-1, w:.15 }
  ];

  function pick() {
    let r = Math.random(), acc = 0;
    for (const t of TYPES) { acc += t.w; if (r <= acc) return t; }
    return TYPES[0];
  }

  function start() {
    document.getElementById("over").classList.remove("show");
    px = W/2; items = []; sparkles = []; score = 0; lives = 3;
    spawnGap = 900; speedMul = 1; running = true;
    updateHud(); lastTs = 0;
    requestAnimationFrame(loop);
  }

  function updateHud() {
    document.getElementById("score").textContent = score;
    document.getElementById("lives").textContent = lives;
  }

  function loop(ts) {
    if (!running) return;
    if (!lastTs) lastTs = ts;
    const dt = Math.min(40, ts - lastTs); lastTs = ts;

    spawnT += dt;
    if (spawnT > spawnGap) {
      spawnT = 0;
      const t = pick();
      items.push({ x: 30 + Math.random()*(W-60), y: -30, vy: (1.6 + Math.random()*1.2) * speedMul, t });
      // zorlaşma
      spawnGap = Math.max(420, spawnGap - 6);
      speedMul = Math.min(2.6, speedMul + 0.006);
    }

    ctx.clearRect(0,0,W,H);

    // ışıltılar
    sparkles = sparkles.filter(s => (s.a -= dt*0.003) > 0);
    sparkles.forEach(s => {
      ctx.globalAlpha = s.a;
      ctx.font = "18px serif"; ctx.textAlign = "center";
      ctx.fillText("✨", s.x, s.y -= dt*0.05);
      ctx.globalAlpha = 1;
    });

    // nesneler
    ctx.font = "32px serif"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
    items.forEach(it => { it.y += it.vy * dt * 0.06; ctx.fillText(it.t.e, it.x, it.y); });

    // oyuncu
    ctx.font = "52px serif";
    ctx.fillText("🦄", px, H - 44);

    // çarpışma
    items = items.filter(it => {
      if (it.y > H - 80 && it.y < H - 10 && Math.abs(it.x - px) < 44) {
        if (it.t.p < 0) {
          lives--; updateHud();
          if (lives <= 0) { endGame(); }
        } else {
          score += it.t.p; updateHud();
          for (let i=0;i<3;i++) sparkles.push({ x: it.x + (Math.random()*30-15), y: it.y, a: 1 });
        }
        return false;
      }
      return it.y < H + 40;
    });

    if (running) requestAnimationFrame(loop);
  }

  function endGame() {
    running = false;
    if (score > best) {
      best = score;
      try { localStorage.setItem("yildizBest", best); } catch(e) {}
      document.getElementById("best").textContent = best;
      document.getElementById("overTitle").textContent = "🏆 Yeni Rekor Eylül!";
    } else document.getElementById("overTitle").textContent = "💫 Oyun Bitti!";
    document.getElementById("finalScore").textContent = score;
    document.getElementById("overMsg").textContent = MSGS[Math.floor(Math.random()*MSGS.length)];
    document.getElementById("over").classList.add("show");
  }

  function movePlayer(clientX) {
    const r = cv.getBoundingClientRect();
    px = Math.max(30, Math.min(W - 30, (clientX - r.left) * (W / r.width)));
  }
  cv.addEventListener("touchstart", e => movePlayer(e.touches[0].clientX), {passive:true});
  cv.addEventListener("touchmove", e => { e.preventDefault(); movePlayer(e.touches[0].clientX); }, {passive:false});
  cv.addEventListener("mousemove", e => movePlayer(e.clientX));

  start();
</script>
</body>
</html>
