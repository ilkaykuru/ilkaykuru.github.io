<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Yıldız İtmece 📦</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="theme-color" content="#2b1055">

<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; -webkit-user-select:none; user-select:none; touch-action:none; font-family:'Comic Sans MS','Segoe UI',sans-serif; }
  body { min-height:100vh; min-height:100dvh; color:#fff;
    background:linear-gradient(160deg,#1c1040 0%,#43286e 55%,#7a4fae 100%);
    display:flex; flex-direction:column; align-items:center; padding:8px; overflow-x:hidden; touch-action:manipulation; }
  .home-btn { position:fixed; top:8px; left:10px; z-index:30; border-radius:14px; padding:8px 13px; font-size:.95rem;
    font-weight:bold; background:rgba(255,255,255,.92); color:#6b4a8a; box-shadow:0 4px 12px rgba(0,0,0,.2); text-decoration:none; }
  h1 { font-size:clamp(1.1rem,4vw,1.7rem); margin:38px 0 4px; text-shadow:0 3px 10px rgba(0,0,0,.4); }
  .topbar { display:flex; gap:8px; flex-wrap:wrap; justify-content:center; margin-bottom:8px; }
  .topbar div { background:rgba(255,255,255,.16); border-radius:11px; padding:6px 12px; font-weight:bold; font-size:.9rem; }
  #board { display:grid; gap:2px; background:rgba(0,0,0,.25); padding:6px; border-radius:14px; box-shadow:0 8px 24px rgba(0,0,0,.35); }
  .tile { width:var(--ts); height:var(--ts); display:flex; align-items:center; justify-content:center; font-size:calc(var(--ts)*.62); border-radius:6px; }
  .wall { background:#3a2a5e; }
  .floor { background:rgba(255,255,255,.07); }
  .target { background:rgba(255,217,61,.25); box-shadow:inset 0 0 0 2px rgba(255,217,61,.5); }
  .pad { display:grid; grid-template-columns:repeat(3,64px); grid-template-rows:repeat(3,56px); gap:6px; margin-top:12px; }
  .pad button { border:none; border-radius:14px; font-size:1.5rem; cursor:pointer;
    background:rgba(255,255,255,.22); color:#fff; box-shadow:0 3px 8px rgba(0,0,0,.25); }
  .pad button:active { background:rgba(255,255,255,.45); }
  .pad .up{grid-column:2;grid-row:1} .pad .left{grid-column:1;grid-row:2} .pad .down{grid-column:2;grid-row:2} .pad .right{grid-column:3;grid-row:2}
  .controls { display:flex; gap:8px; margin-top:10px; }
  .btn { border:none; border-radius:13px; padding:10px 18px; font-weight:bold; font-size:.95rem; cursor:pointer;
    background:rgba(255,255,255,.22); color:#fff; }
  .btn.y { background:linear-gradient(135deg,#ffd93d,#ff9a3d); color:#5b3a00; }
  .screen { position:fixed; inset:0; background:rgba(20,10,50,.93); backdrop-filter:blur(6px); display:none;
    flex-direction:column; align-items:center; justify-content:center; z-index:25; text-align:center; padding:22px; }
  .screen.show { display:flex; }
  .screen h2 { font-size:1.9rem; margin-bottom:8px; } .screen p { font-size:1.05rem; margin:4px 0; }
  .lvls { display:grid; grid-template-columns:repeat(5,minmax(46px,1fr)); gap:9px; max-width:360px; margin:14px 0; }
  .lvls button { aspect-ratio:1; border:none; border-radius:12px; font-weight:bold; font-size:1rem; cursor:pointer;
    background:rgba(255,255,255,.9); color:#6b4a8a; box-shadow:0 3px 8px rgba(0,0,0,.2); }
  .lvls button.locked { background:rgba(255,255,255,.2); color:rgba(255,255,255,.5); }
  .lvls button.solved { background:linear-gradient(135deg,#ffe082,#ffb74d); }
  .hint { font-size:.8rem; opacity:.82; margin-top:6px; text-align:center; max-width:480px; }
</style>
</head>
<body>
<a class="home-btn" href="index.html">🏠 Menü</a>
<h1>📦 Yıldız İtmece</h1>
<div class="topbar">
  <div>🧩 Bölüm: <span id="lvlNo">1</span></div>
  <div>👣 Adım: <span id="steps">0</span></div>
  <div>⭐ Çözülen: <span id="solvedCount">0</span>/<span id="total">25</span></div>
</div>
<div id="board"></div>
<div class="controls">
  <button class="btn" id="undoBtn">↩️ Geri Al</button>
  <button class="btn" id="restartBtn">🔄 Sıfırla</button>
  <button class="btn y" onclick="openMap()">🗺️ Bölümler</button>
</div>
<div class="pad">
  <button class="up" data-d="0,-1">⬆️</button>
  <button class="left" data-d="-1,0">⬅️</button>
  <button class="down" data-d="0,1">⬇️</button>
  <button class="right" data-d="1,0">➡️</button>
</div>
<div class="hint">Yıldızları (⭐) sarı hedeflere it. Kutuyu çekemezsin, sadece itebilirsin! Kaydırarak da oynayabilirsin.</div>

<div class="screen show" id="mapScreen">
  <h2>📦 Yıldız İtmece</h2>
  <p>Mantık bulmacası — her bölümde yıldızları hedeflere ulaştır.</p>
  <div class="lvls" id="lvlsGrid"></div>
</div>

<div class="screen" id="winScreen">
  <h2 id="winTitle">🎉 Çözdün!</h2>
  <p id="winMsg"></p>
  <button class="btn y" id="nextBtn" style="margin-top:14px">▶️ Sonraki Bölüm</button>
  <button class="btn" style="margin-top:10px" onclick="openMap()">🗺️ Bölümler</button>
</div>

<script>
  // Sokoban bölümleri. # duvar, @ oyuncu, $ kutu(yıldız), . hedef, * kutu hedefte, + oyuncu hedefte, boşluk zemin
  const LEVELS = JSON.parse("[\"######\\n#. $ #\\n#  $@#\\n# .  #\\n#    #\\n######\",\"######\\n#   ##\\n# @$ #\\n#.   #\\n#  $.#\\n######\",\"######\\n#   .#\\n#  $ #\\n# @$ #\\n# .  #\\n######\",\"######\\n#   @#\\n# .$$#\\n##  .#\\n#   *#\\n######\",\"######\\n# @  #\\n#$.$ #\\n#  $ #\\n#. . #\\n######\",\"######\\n##   #\\n#  . #\\n# $*$#\\n#@  .#\\n######\",\"#######\\n#  #  #\\n# $.@*#\\n# *# ##\\n#     #\\n#######\",\"#######\\n#@   .#\\n# $*  #\\n#  # ##\\n# $.  #\\n#######\",\"#######\\n#.$  ##\\n#@*   #\\n#    *#\\n#     #\\n#######\",\"#######\\n##    #\\n## *  #\\n#@$  .#\\n# $.  #\\n#######\",\"#######\\n#     #\\n#.$$# #\\n# . @ #\\n# *   #\\n#######\",\"#######\\n#*#   #\\n#    ##\\n# . $ #\\n#.$  @#\\n#######\",\"#######\\n#     #\\n#$ $ $#\\n#   @.#\\n#.#  .#\\n# #  ##\\n#######\",\"#######\\n#     #\\n#   $@#\\n#* # .#\\n#  $. #\\n###   #\\n#######\",\"#######\\n#.    #\\n#$  + #\\n#    ##\\n# $ ###\\n#   $.#\\n#######\",\"#######\\n#.    #\\n# ##$ #\\n##  . #\\n# $ $ #\\n#@*.  #\\n#######\",\"#######\\n#@$ . #\\n# $   #\\n## .  #\\n#*   ##\\n#    *#\\n#######\",\"#######\\n###  @#\\n# *.* #\\n#     #\\n#.$ $ #\\n#     #\\n#######\",\"########\\n##.$  .#\\n# #.$$ #\\n# .  $ #\\n#     @#\\n#    ###\\n########\",\"########\\n#   #* #\\n#     @#\\n#  .#* #\\n# $$  .#\\n#      #\\n########\",\"########\\n#. $@  #\\n# #  $$#\\n#  #   #\\n#  $ ..#\\n#     .#\\n########\",\"########\\n#  . $ #\\n# *  $@#\\n#*    ##\\n#    . #\\n#  #   #\\n########\",\"########\\n## ..$ #\\n#.#  * #\\n#  $  @#\\n#  #$  #\\n##     #\\n########\",\"########\\n# @.#  #\\n#$#$* ##\\n#      #\\n#   * ##\\n#.     #\\n########\",\"########\\n#  ..  #\\n#@$  $ #\\n#      #\\n#$  #  #\\n#. #  *#\\n########\"]");
  const SAVE = "itmeceSolved";
  let solved = {};
  try { solved = JSON.parse(localStorage.getItem(SAVE)) || {}; } catch(e) { solved = {}; }
  document.getElementById("total").textContent = LEVELS.length;

  let cur = 0, grid, targets, px, py, steps, history, W, H;
  const boardEl = document.getElementById("board");

  function saveSolved(){ try { localStorage.setItem(SAVE, JSON.stringify(solved)); } catch(e) {} }
  function solvedTotal(){ return Object.keys(solved).filter(k=>solved[k]).length; }

  function openMap() {
    document.querySelectorAll(".screen").forEach(s => s.classList.remove("show"));
    const g = document.getElementById("lvlsGrid"); g.innerHTML = "";
    LEVELS.forEach((lv,i) => {
      const unlocked = i === 0 || solved[i-1];
      const b = document.createElement("button");
      b.className = !unlocked ? "locked" : solved[i] ? "solved" : "";
      b.textContent = !unlocked ? "🔒" : solved[i] ? "⭐" : (i+1);
      if (unlocked) b.onclick = () => loadLevel(i);
      g.appendChild(b);
    });
    document.getElementById("solvedCount").textContent = solvedTotal();
    document.getElementById("mapScreen").classList.add("show");
  }

  function loadLevel(i) {
    cur = i;
    const rows = LEVELS[i].split("\n");
    H = rows.length; W = Math.max(...rows.map(r => r.length));
    grid = []; targets = []; steps = 0; history = [];
    for (let y = 0; y < H; y++) {
      grid[y] = [];
      for (let x = 0; x < W; x++) {
        const ch = rows[y][x] || " ";
        let cell = "floor";
        if (ch === "#") cell = "wall";
        if (ch === "." || ch === "*" || ch === "+") targets.push(x+","+y);
        if (ch === "@" || ch === "+") { px = x; py = y; }
        grid[y][x] = (ch === "#") ? "wall" : "floor";
        // kutular ayrı katmanda
      }
    }
    // kutu konumları
    boxes = new Set();
    for (let y = 0; y < H; y++) for (let x = 0; x < W; x++) {
      const ch = rows[y][x] || " ";
      if (ch === "$" || ch === "*") boxes.add(x+","+y);
    }
    document.querySelectorAll(".screen").forEach(s => s.classList.remove("show"));
    document.getElementById("lvlNo").textContent = i+1;
    sizeBoard();
    render();
    updateHud();
  }

  let boxes;
  const tset = () => new Set(targets);

  function sizeBoard() {
    const maxW = Math.min(window.innerWidth - 24, 440);
    const maxH = window.innerHeight - 280;
    let ts = Math.floor(Math.min((maxW - (W+1)*2 - 12)/W, (maxH)/H));
    ts = Math.max(26, Math.min(60, ts));
    document.documentElement.style.setProperty("--ts", ts + "px");
    boardEl.style.gridTemplateColumns = `repeat(${W}, ${ts}px)`;
  }

  function render() {
    const tg = tset();
    boardEl.innerHTML = "";
    for (let y = 0; y < H; y++) for (let x = 0; x < W; x++) {
      const k = x+","+y;
      const d = document.createElement("div");
      let cls = "tile ";
      if (grid[y][x] === "wall") cls += "wall";
      else if (tg.has(k)) cls += "target";
      else cls += "floor";
      d.className = cls;
      if (boxes.has(k)) d.textContent = tg.has(k) ? "🌟" : "⭐";
      else if (px === x && py === y) d.textContent = "🦄";
      else if (grid[y][x] === "wall") d.textContent = "";
      boardEl.appendChild(d);
    }
  }

  function updateHud() { document.getElementById("steps").textContent = steps; }

  function move(dx, dy) {
    const nx = px+dx, ny = py+dy;
    if (grid[ny]?.[nx] === "wall") return;
    const nk = nx+","+ny;
    if (boxes.has(nk)) {
      const bx = nx+dx, by = ny+dy;
      if (grid[by]?.[bx] === "wall" || boxes.has(bx+","+by)) return; // itilemez
      // hamleyi kaydet
      history.push({ px, py, box: nk, to: bx+","+by });
      boxes.delete(nk); boxes.add(bx+","+by);
      px = nx; py = ny;
    } else {
      history.push({ px, py });
      px = nx; py = ny;
    }
    steps++; updateHud(); render();
    checkWin();
  }

  function undo() {
    const h = history.pop(); if (!h) return;
    px = h.px; py = h.py;
    if (h.box) { boxes.delete(h.to); boxes.add(h.box); }
    steps = Math.max(0, steps-1); updateHud(); render();
  }

  function checkWin() {
    const tg = tset();
    for (const t of tg) if (!boxes.has(t)) return;
    // tüm hedefler dolu
    solved[cur] = true; saveSolved();
    setTimeout(() => {
      document.getElementById("winMsg").textContent = `${steps} adımda çözdün! Harikasın Eylül! 🌟`;
      const nb = document.getElementById("nextBtn");
      if (cur+1 < LEVELS.length) { nb.style.display = "inline-block"; nb.onclick = () => loadLevel(cur+1); }
      else { nb.style.display = "none"; document.getElementById("winTitle").textContent = "👑 Tüm Bulmacalar Çözüldü!"; }
      document.getElementById("winScreen").classList.add("show");
    }, 200);
  }

  // kontroller
  document.querySelectorAll(".pad button").forEach(b => {
    const [dx,dy] = b.dataset.d.split(",").map(Number);
    let rep = null;
    const start = e => { e.preventDefault(); move(dx,dy);
      clearInterval(rep); rep = setInterval(() => move(dx,dy), 220); };
    const stop = () => { clearInterval(rep); rep = null; };
    b.addEventListener("touchstart", start, {passive:false});
    b.addEventListener("touchend", stop); b.addEventListener("touchcancel", stop);
    b.addEventListener("mousedown", start);
    b.addEventListener("mouseup", stop); b.addEventListener("mouseleave", stop);
  });
  document.getElementById("undoBtn").onclick = undo;
  document.getElementById("restartBtn").onclick = () => loadLevel(cur);
  document.addEventListener("keydown", e => {
    if (document.querySelector(".screen.show")) return;
    if (e.key === "ArrowUp") move(0,-1);
    else if (e.key === "ArrowDown") move(0,1);
    else if (e.key === "ArrowLeft") move(-1,0);
    else if (e.key === "ArrowRight") move(1,0);
    else if (e.key === "z") undo();
  });
  // kaydırma
  let sx, sy;
  boardEl.addEventListener("touchstart", e => { sx = e.touches[0].clientX; sy = e.touches[0].clientY; }, {passive:true});
  boardEl.addEventListener("touchend", e => {
    const dx = e.changedTouches[0].clientX - sx, dy = e.changedTouches[0].clientY - sy;
    if (Math.abs(dx) < 22 && Math.abs(dy) < 22) return;
    if (Math.abs(dx) > Math.abs(dy)) move(Math.sign(dx), 0); else move(0, Math.sign(dy));
  }, {passive:true});

  window.addEventListener("resize", () => { if (grid) { sizeBoard(); render(); } });
  openMap();
</script>
<script>
if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js').catch(function(){}); }
</script>
</body>
</html>
