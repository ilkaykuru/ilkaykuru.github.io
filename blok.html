<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Blok Yağmuru 🟦</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="theme-color" content="#2b1055">

<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; -webkit-user-select:none; user-select:none; touch-action:manipulation; font-family:'Segoe UI',system-ui,sans-serif; }
  body { min-height:100vh; min-height:100dvh; background:linear-gradient(160deg,#0d1021 0%,#1c2541 60%,#3a506b 100%);
    color:#eee; display:flex; flex-direction:column; align-items:center; padding:6px; overflow:hidden; }
  .home-btn { position:fixed; top:8px; left:10px; z-index:30; border-radius:14px; padding:8px 13px; font-size:.95rem;
    font-weight:bold; background:rgba(255,255,255,.92); color:#1c2541; box-shadow:0 4px 12px rgba(0,0,0,.3); text-decoration:none; }
  .wrap { display:flex; gap:10px; align-items:flex-start; margin-top:40px; }
  .side { display:flex; flex-direction:column; gap:8px; width:88px; }
  .panel { background:rgba(255,255,255,.08); border-radius:12px; padding:8px; text-align:center; }
  .panel .lab { font-size:.66rem; font-weight:bold; opacity:.7; letter-spacing:1px; }
  .panel .val { font-size:1.05rem; font-weight:bold; }
  .panel canvas { display:block; margin:4px auto 0; }
  #cv { background:rgba(0,0,0,.45); border-radius:10px; box-shadow:0 12px 32px rgba(0,0,0,.55); display:block; }
  .controls { display:grid; grid-template-columns:repeat(4,72px); gap:8px; margin-top:10px; }
  .controls button { height:60px; border:none; border-radius:14px; font-size:1.45rem; cursor:pointer;
    background:rgba(255,255,255,.16); color:#fff; box-shadow:0 4px 10px rgba(0,0,0,.3); }
  .controls button:active { background:rgba(255,255,255,.38); }
  .controls .drop { background:rgba(255,217,61,.3); }
  .screen { position:fixed; inset:0; background:rgba(8,12,25,.94); backdrop-filter:blur(6px); display:none;
    flex-direction:column; align-items:center; justify-content:center; z-index:25; text-align:center; padding:22px; }
  .screen.show { display:flex; }
  .screen h2 { font-size:2rem; margin-bottom:10px; }
  .screen p { font-size:1.1rem; margin:4px 0; }
  .screen button { margin-top:14px; border:none; border-radius:14px; padding:13px 30px; font-weight:bold; font-size:1.1rem;
    cursor:pointer; background:linear-gradient(135deg,#ffd93d,#ff9a3d); color:#5b3a00; }
</style>
</head>
<body>
<a class="home-btn" href="index.html">🏠 Menü</a>
<div class="wrap">
  <div class="side">
    <div class="panel"><div class="lab">SKOR</div><div class="val" id="score">0</div></div>
    <div class="panel"><div class="lab">SEVİYE</div><div class="val" id="level">1</div></div>
    <div class="panel"><div class="lab">SATIR</div><div class="val" id="lines">0</div></div>
    <div class="panel"><div class="lab">REKOR</div><div class="val" id="best">0</div></div>
  </div>
  <canvas id="cv"></canvas>
  <div class="side">
    <div class="panel"><div class="lab">SIRADA</div><canvas id="nextCv" width="72" height="170"></canvas></div>
    <div class="panel"><div class="lab">TUT (⇪)</div><canvas id="holdCv" width="72" height="58"></canvas></div>
    <div class="panel" style="cursor:pointer" id="pauseBtn"><div class="val">⏸️</div></div>
  </div>
</div>
<div class="controls">
  <button id="lBtn">⬅️</button>
  <button id="rotBtn">🔄</button>
  <button id="rBtn">➡️</button>
  <button id="holdBtn">⇪</button>
  <button id="dBtn" style="grid-column:1/3">⬇️ İndir</button>
  <button class="drop" id="dropBtn" style="grid-column:3/5">⤓ BIRAK</button>
</div>

<div class="screen show" id="startScreen">
  <h2>🟦 Blok Yağmuru</h2>
  <p>Satırları doldur, yok et, seviye atla!</p>
  <p style="font-size:.85rem;opacity:.75">Kaydır: taşı · Dokun: döndür · Aşağı kaydır: bırak</p>
  <button onclick="startGame()">▶️ Başla</button>
</div>
<div class="screen" id="overScreen">
  <h2 id="overTitle">Oyun Bitti</h2>
  <p id="overMsg"></p>
  <button onclick="startGame()">🔄 Tekrar</button>
</div>
<div class="screen" id="pauseScreen">
  <h2>⏸️ Duraklatıldı</h2>
  <button onclick="togglePause()">▶️ Devam</button>
</div>

<script>
/* ============ TETRIS ÇEKİRDEĞİ ============ */
const TET = (() => {
  const SHAPES = {
    I: [[[0,1],[1,1],[2,1],[3,1]], [[2,0],[2,1],[2,2],[2,3]], [[0,2],[1,2],[2,2],[3,2]], [[1,0],[1,1],[1,2],[1,3]]],
    O: [[[1,0],[2,0],[1,1],[2,1]], [[1,0],[2,0],[1,1],[2,1]], [[1,0],[2,0],[1,1],[2,1]], [[1,0],[2,0],[1,1],[2,1]]],
    T: [[[1,0],[0,1],[1,1],[2,1]], [[1,0],[1,1],[2,1],[1,2]], [[0,1],[1,1],[2,1],[1,2]], [[1,0],[0,1],[1,1],[1,2]]],
    S: [[[1,0],[2,0],[0,1],[1,1]], [[1,0],[1,1],[2,1],[2,2]], [[1,1],[2,1],[0,2],[1,2]], [[0,0],[0,1],[1,1],[1,2]]],
    Z: [[[0,0],[1,0],[1,1],[2,1]], [[2,0],[1,1],[2,1],[1,2]], [[0,1],[1,1],[1,2],[2,2]], [[1,0],[0,1],[1,1],[0,2]]],
    J: [[[0,0],[0,1],[1,1],[2,1]], [[1,0],[2,0],[1,1],[1,2]], [[0,1],[1,1],[2,1],[2,2]], [[1,0],[1,1],[0,2],[1,2]]],
    L: [[[2,0],[0,1],[1,1],[2,1]], [[1,0],[1,1],[1,2],[2,2]], [[0,1],[1,1],[2,1],[0,2]], [[0,0],[1,0],[1,1],[1,2]]]
  };
  const COLORS = { I:'#4dd0e1', O:'#ffd54f', T:'#ba68c8', S:'#81c784', Z:'#e57373', J:'#7986cb', L:'#ffb74d' };
  const KICKS = [[0,0],[-1,0],[1,0],[0,-1],[-2,0],[2,0]];
  const W = 10, H = 20;

  function emptyBoard() { return Array.from({length:H}, () => new Array(W).fill('')); }

  function bag() {
    const a = Object.keys(SHAPES);
    for (let i = a.length-1; i > 0; i--) { const j = Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
    return a;
  }

  function fits(board, type, rot, x, y) {
    for (const [dx,dy] of SHAPES[type][rot]) {
      const nx = x+dx, ny = y+dy;
      if (nx < 0 || nx >= W || ny >= H) return false;
      if (ny >= 0 && board[ny][nx]) return false;
    }
    return true;
  }

  function lock(board, type, rot, x, y) {
    for (const [dx,dy] of SHAPES[type][rot]) {
      const ny = y+dy;
      if (ny < 0) return false; // tavanı aştı
      board[ny][x+dx] = type;
    }
    return true;
  }

  function clearLines(board) {
    let cleared = 0;
    for (let r = H-1; r >= 0; r--) {
      if (board[r].every(c => c)) {
        board.splice(r, 1);
        board.unshift(new Array(W).fill(''));
        cleared++; r++;
      }
    }
    return cleared;
  }

  return { SHAPES, COLORS, KICKS, W, H, emptyBoard, bag, fits, lock, clearLines };
})();

/* ============ OYUN ============ */
const cv = document.getElementById('cv'), ctx = cv.getContext('2d');
const nextCv = document.getElementById('nextCv'), nctx = nextCv.getContext('2d');
const holdCv = document.getElementById('holdCv'), hctx = holdCv.getContext('2d');
let CELL = 24;

function sizeCanvas() {
  const availH = window.innerHeight - 210;
  const availW = window.innerWidth - 200;
  CELL = Math.max(16, Math.min(28, Math.floor(Math.min(availH / TET.H, availW / TET.W))));
  cv.width = TET.W * CELL; cv.height = TET.H * CELL;
}

let board, cur, curRot, curX, curY, queue, hold, canHold, score, lines, level, best, over = true, paused = false;
let dropT = 0, lastTs = 0, raf = null, combo = 0;

try { best = +localStorage.getItem('blokBest') || 0; } catch(e) { best = 0; }
document.getElementById('best').textContent = best;

function refill() { while (queue.length < 5) queue.push(...TET.bag()); }

function spawn() {
  refill();
  cur = queue.shift();
  curRot = 0; curX = 3; curY = -1;
  canHold = true;
  if (!TET.fits(board, cur, curRot, curX, curY)) return false;
  return true;
}

function startGame() {
  board = TET.emptyBoard();
  queue = []; hold = null;
  score = 0; lines = 0; level = 1; combo = 0;
  over = false; paused = false;
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('show'));
  spawn();
  updateHud();
  lastTs = 0; dropT = 0;
  cancelAnimationFrame(raf);
  raf = requestAnimationFrame(loop);
}
window.startGame = startGame;

function gravityMs() { return Math.max(70, 800 * Math.pow(0.82, level-1)); }

function loop(ts) {
  if (over) return;
  if (!lastTs) lastTs = ts;
  const dt = ts - lastTs; lastTs = ts;
  if (!paused) {
    dropT += dt;
    if (dropT > gravityMs()) { dropT = 0; softStep(); }
  }
  draw();
  raf = requestAnimationFrame(loop);
}

function softStep() {
  if (TET.fits(board, cur, curRot, curX, curY+1)) curY++;
  else lockDown();
}

function lockDown() {
  if (!TET.lock(board, cur, curRot, curX, curY)) return gameOver();
  const c = TET.clearLines(board);
  if (c > 0) {
    combo++;
    const base = [0, 100, 300, 500, 800][c];
    score += base * level + (combo-1) * 50 * level;
    lines += c;
    const newLevel = 1 + (lines / 10 | 0);
    if (newLevel > level) level = newLevel;
  } else combo = 0;
  updateHud();
  if (!spawn()) gameOver();
}

function move(dx) {
  if (over || paused) return;
  if (TET.fits(board, cur, curRot, curX+dx, curY)) { curX += dx; draw(); }
}
function rotate() {
  if (over || paused) return;
  const nr = (curRot + 1) % 4;
  for (const [kx,ky] of TET.KICKS) {
    if (TET.fits(board, cur, nr, curX+kx, curY+ky)) { curRot = nr; curX += kx; curY += ky; draw(); return; }
  }
}
function softDrop() {
  if (over || paused) return;
  if (TET.fits(board, cur, curRot, curX, curY+1)) { curY++; score += 1; updateHud(); draw(); }
  else lockDown();
}
function hardDrop() {
  if (over || paused) return;
  let d = 0;
  while (TET.fits(board, cur, curRot, curX, curY+1)) { curY++; d++; }
  score += d * 2;
  lockDown();
  draw();
}
function doHold() {
  if (over || paused || !canHold) return;
  canHold = false;
  const tmp = hold;
  hold = cur;
  if (tmp) { cur = tmp; curRot = 0; curX = 3; curY = -1; }
  else spawn();
  draw();
}

function gameOver() {
  over = true;
  cancelAnimationFrame(raf);
  if (score > best) {
    best = score;
    try { localStorage.setItem('blokBest', best); } catch(e) {}
    document.getElementById('best').textContent = best;
    document.getElementById('overTitle').textContent = '🏆 Yeni Rekor!';
  } else document.getElementById('overTitle').textContent = '💥 Oyun Bitti';
  document.getElementById('overMsg').textContent = `Skor: ${score} · Satır: ${lines} · Seviye: ${level}`;
  document.getElementById('overScreen').classList.add('show');
}

function togglePause() {
  if (over) return;
  paused = !paused;
  document.getElementById('pauseScreen').classList.toggle('show', paused);
}
window.togglePause = togglePause;

function updateHud() {
  document.getElementById('score').textContent = score;
  document.getElementById('level').textContent = level;
  document.getElementById('lines').textContent = lines;
  drawSide();
}

/* ---------- çizim ---------- */
function block(c, x, y, size, color, ghost) {
  c.fillStyle = ghost ? 'rgba(255,255,255,.13)' : color;
  c.fillRect(x, y, size, size);
  if (!ghost) {
    c.fillStyle = 'rgba(255,255,255,.25)';
    c.fillRect(x, y, size, size*0.18);
    c.fillStyle = 'rgba(0,0,0,.22)';
    c.fillRect(x, y+size*0.82, size, size*0.18);
  } else {
    c.strokeStyle = 'rgba(255,255,255,.3)';
    c.strokeRect(x+1, y+1, size-2, size-2);
  }
}

function draw() {
  ctx.clearRect(0, 0, cv.width, cv.height);
  // ızgara
  ctx.strokeStyle = 'rgba(255,255,255,.05)';
  for (let x = 0; x <= TET.W; x++) { ctx.beginPath(); ctx.moveTo(x*CELL,0); ctx.lineTo(x*CELL,cv.height); ctx.stroke(); }
  for (let y = 0; y <= TET.H; y++) { ctx.beginPath(); ctx.moveTo(0,y*CELL); ctx.lineTo(cv.width,y*CELL); ctx.stroke(); }
  // sabit bloklar
  for (let r = 0; r < TET.H; r++) for (let c = 0; c < TET.W; c++)
    if (board[r][c]) block(ctx, c*CELL, r*CELL, CELL, TET.COLORS[board[r][c]]);
  if (over) return;
  // hayalet
  let gy = curY;
  while (TET.fits(board, cur, curRot, curX, gy+1)) gy++;
  for (const [dx,dy] of TET.SHAPES[cur][curRot])
    if (gy+dy >= 0) block(ctx, (curX+dx)*CELL, (gy+dy)*CELL, CELL, '', true);
  // aktif parça
  for (const [dx,dy] of TET.SHAPES[cur][curRot])
    if (curY+dy >= 0) block(ctx, (curX+dx)*CELL, (curY+dy)*CELL, CELL, TET.COLORS[cur]);
}

function drawMini(c, type, ox, oy, size) {
  for (const [dx,dy] of TET.SHAPES[type][0]) block(c, ox+dx*size, oy+dy*size, size, TET.COLORS[type]);
}

function drawSide() {
  nctx.clearRect(0,0,nextCv.width,nextCv.height);
  refill();
  for (let i = 0; i < 3; i++) drawMini(nctx, queue[i], 4, 6 + i*54, 15);
  hctx.clearRect(0,0,holdCv.width,holdCv.height);
  if (hold) drawMini(hctx, hold, 4, 8, 15);
}

/* ---------- kontroller ---------- */
document.getElementById('lBtn').onclick = () => move(-1);
document.getElementById('rBtn').onclick = () => move(1);
document.getElementById('rotBtn').onclick = rotate;
document.getElementById('dBtn').onclick = softDrop;
document.getElementById('dropBtn').onclick = hardDrop;
document.getElementById('holdBtn').onclick = doHold;
document.getElementById('pauseBtn').onclick = togglePause;

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft') move(-1);
  else if (e.key === 'ArrowRight') move(1);
  else if (e.key === 'ArrowUp') rotate();
  else if (e.key === 'ArrowDown') softDrop();
  else if (e.key === ' ') { e.preventDefault(); hardDrop(); }
  else if (e.key === 'c' || e.key === 'C') doHold();
  else if (e.key === 'p' || e.key === 'P') togglePause();
});

// dokunmatik: canvas üzerinde kaydır/dokun
let tsX = 0, tsY = 0, tMoved = false, lastMoveX = 0;
cv.addEventListener('touchstart', e => {
  tsX = e.touches[0].clientX; tsY = e.touches[0].clientY;
  lastMoveX = tsX; tMoved = false;
}, {passive:true});
cv.addEventListener('touchmove', e => {
  const x = e.touches[0].clientX;
  const step = CELL * 1.1;
  while (x - lastMoveX > step) { move(1); lastMoveX += step; tMoved = true; }
  while (lastMoveX - x > step) { move(-1); lastMoveX -= step; tMoved = true; }
}, {passive:true});
cv.addEventListener('touchend', e => {
  const dy = e.changedTouches[0].clientY - tsY;
  const dx = e.changedTouches[0].clientX - tsX;
  if (dy > 70 && Math.abs(dy) > Math.abs(dx)) { hardDrop(); return; }
  if (dy < -50 && Math.abs(dy) > Math.abs(dx)) { doHold(); return; }
  if (!tMoved && Math.abs(dx) < 12 && Math.abs(dy) < 12) rotate();
}, {passive:true});

sizeCanvas();
window.addEventListener('resize', () => { sizeCanvas(); if (board) draw(); });
board = TET.emptyBoard();
draw();

if (typeof module !== 'undefined') module.exports = TET;
</script>
<script>
if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js').catch(function(){}); }
</script>
</body>
</html>
