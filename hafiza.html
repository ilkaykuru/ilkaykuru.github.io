<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Eylül'ün Yıldız Hafızası 🌟</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="theme-color" content="#2b1055">

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Comic Sans MS', 'Segoe UI', sans-serif;
    min-height: 100vh;
    background: linear-gradient(160deg, #2b1055 0%, #7597de 50%, #f7a8d8 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 16px;
    overflow-x: hidden;
    position: relative;
    color: #fff;
  }

  /* yıldızlar */
  .star {
    position: fixed;
    border-radius: 50%;
    background: #fff;
    opacity: .8;
    animation: twinkle 2s infinite alternate;
    pointer-events: none;
    z-index: 0;
  }
  @keyframes twinkle { from { opacity: .2; } to { opacity: .9; } }

  h1 {
    font-size: clamp(1.4rem, 5vw, 2.4rem);
    text-shadow: 0 3px 12px rgba(0,0,0,.4);
    margin: 44px 0 4px;
    z-index: 1;
    text-align: center;
  }
  .subtitle { font-size: 1rem; opacity: .9; z-index: 1; margin-bottom: 14px; text-align: center; }

  .hud {
    display: flex;
    gap: 12px;
    z-index: 1;
    margin-bottom: 14px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .hud div {
    background: rgba(255,255,255,.18);
    backdrop-filter: blur(6px);
    border-radius: 16px;
    padding: 8px 18px;
    font-size: 1.05rem;
    font-weight: bold;
    box-shadow: 0 4px 12px rgba(0,0,0,.15);
  }

  .levels { display: flex; gap: 10px; z-index: 1; margin-bottom: 14px; }
  .levels button {
    border: none;
    border-radius: 14px;
    padding: 8px 16px;
    font-family: inherit;
    font-size: .95rem;
    font-weight: bold;
    cursor: pointer;
    background: rgba(255,255,255,.25);
    color: #fff;
    transition: transform .15s;
  }
  .levels button:hover { transform: scale(1.08); }
  .levels button.active { background: #ffd93d; color: #5b3a00; box-shadow: 0 4px 14px rgba(255,217,61,.5); }

  #board {
    display: grid;
    gap: 10px;
    z-index: 1;
    perspective: 900px;
    width: min(92vw, 560px);
  }

  .card {
    aspect-ratio: 3/4;
    cursor: pointer;
    position: relative;
    transform-style: preserve-3d;
    transition: transform .45s cubic-bezier(.4,1.4,.6,1);
  }
  .card.flipped { transform: rotateY(180deg); }
  .card.matched { animation: pop .5s; cursor: default; }
  @keyframes pop {
    0% { transform: rotateY(180deg) scale(1); }
    50% { transform: rotateY(180deg) scale(1.15); }
    100% { transform: rotateY(180deg) scale(1); }
  }

  .face {
    position: absolute;
    inset: 0;
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    backface-visibility: hidden;
    box-shadow: 0 5px 14px rgba(0,0,0,.25);
  }
  .front {
    background: linear-gradient(135deg, #845ec2, #ff6f91);
    font-size: clamp(1.4rem, 6vw, 2.2rem);
  }
  .front::after { content: "✨"; }
  .back {
    background: linear-gradient(135deg, #fff6e9, #ffe3f1);
    transform: rotateY(180deg);
    font-size: clamp(1.8rem, 8vw, 3rem);
  }
  .card.matched .back {
    background: linear-gradient(135deg, #d4ffd4, #aaf0d1);
    box-shadow: 0 0 18px rgba(120,255,160,.8);
  }

  /* kazanma ekranı */
  #winScreen {
    position: fixed;
    inset: 0;
    background: rgba(20,5,50,.85);
    backdrop-filter: blur(8px);
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    z-index: 10;
    text-align: center;
    padding: 20px;
  }
  #winScreen.show { display: flex; }
  #winScreen h2 { font-size: clamp(1.8rem, 7vw, 3rem); margin-bottom: 12px; animation: bounce 1s infinite alternate; }
  @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-12px); } }
  #winScreen p { font-size: 1.2rem; margin-bottom: 8px; }
  #winScreen .stars-earned { font-size: 2.5rem; margin: 10px 0; }
  #winScreen button {
    margin-top: 18px;
    border: none;
    border-radius: 18px;
    padding: 14px 34px;
    font-family: inherit;
    font-size: 1.2rem;
    font-weight: bold;
    cursor: pointer;
    background: linear-gradient(135deg, #ffd93d, #ff9a3d);
    color: #5b3a00;
    box-shadow: 0 6px 20px rgba(255,180,60,.5);
    transition: transform .15s;
  }
  #winScreen button:hover { transform: scale(1.08); }

  .confetti {
    position: fixed;
    top: -20px;
    font-size: 1.6rem;
    animation: fall linear forwards;
    z-index: 11;
    pointer-events: none;
  }
  @keyframes fall {
    to { transform: translateY(110vh) rotate(720deg); }
  }

  * { -webkit-user-select:none; user-select:none; touch-action:manipulation; }
  .home-btn { position:fixed; top:10px; left:12px; z-index:8; border-radius:16px; padding:10px 16px;
    font-family:inherit; font-size:1.1rem; font-weight:bold; background:rgba(255,255,255,.92);
    color:#6b4a8a; box-shadow:0 4px 12px rgba(0,0,0,.2); text-decoration:none; }
</style>
</head>
<body>
<a class="home-btn" href="index.html">🏠 Menü</a>

<h1>🌟 Eylül'ün Yıldız Hafızası 🌟</h1>
<div class="subtitle">Aynı kartları eşleştir, yıldızları topla! 🚀</div>

<div class="levels">
  <button data-pairs="6" class="active">Kolay</button>
  <button data-pairs="8">Orta</button>
  <button data-pairs="10">Zor</button>
</div>

<div class="hud">
  <div>🎯 Hamle: <span id="moves">0</span></div>
  <div>⏱️ Süre: <span id="time">0</span> sn</div>
  <div>⭐ Eşleşme: <span id="matches">0</span></div>
</div>

<div id="board"></div>

<div id="winScreen">
  <h2 id="winTitle">🎉 Bravo Eylül! 🎉</h2>
  <div class="stars-earned" id="starRating"></div>
  <p id="winStats"></p>
  <p id="winMsg"></p>
  <button onclick="startGame()">🔄 Tekrar Oyna</button>
</div>

<script>
  const EMOJIS = ["🚀","🪐","⭐","🌙","👑","🦄","🧚","🌈","💎","🛸","☄️","🏰"];
  const WIN_MSGS = [
    "Uzayın en zeki prensesi sensin! 👑🚀",
    "Yıldızlar bile senin hafızanı kıskandı! ⭐",
    "Galaksinin şampiyonu: EYLÜL! 🏆",
    "Periler senin için dans ediyor! 🧚✨",
    "Bu hafıza ile Brawl Stars'ta da şampiyon olursun! 🌟"
  ];

  let pairs = 6, first = null, lock = false, moves = 0, matched = 0, timer = null, seconds = 0;

  // yıldızlı arka plan
  for (let i = 0; i < 40; i++) {
    const s = document.createElement("div");
    s.className = "star";
    const size = Math.random() * 3 + 1;
    s.style.cssText = `width:${size}px;height:${size}px;left:${Math.random()*100}vw;top:${Math.random()*100}vh;animation-delay:${Math.random()*2}s`;
    document.body.appendChild(s);
  }

  document.querySelectorAll(".levels button").forEach(btn => {
    btn.onclick = () => {
      document.querySelector(".levels .active").classList.remove("active");
      btn.classList.add("active");
      pairs = +btn.dataset.pairs;
      startGame();
    };
  });

  function startGame() {
    document.getElementById("winScreen").classList.remove("show");
    first = null; lock = false; moves = 0; matched = 0; seconds = 0;
    updateHud();
    clearInterval(timer);
    timer = setInterval(() => { seconds++; document.getElementById("time").textContent = seconds; }, 1000);

    const chosen = EMOJIS.slice(0, pairs);
    const deck = [...chosen, ...chosen].sort(() => Math.random() - .5);

    const board = document.getElementById("board");
    const cols = pairs <= 6 ? 4 : pairs <= 8 ? 4 : 5;
    board.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
    board.innerHTML = "";

    deck.forEach(emoji => {
      const card = document.createElement("div");
      card.className = "card";
      card.innerHTML = `<div class="face front"></div><div class="face back">${emoji}</div>`;
      card.dataset.emoji = emoji;
      card.onclick = () => flip(card);
      board.appendChild(card);
    });
  }

  function flip(card) {
    if (lock || card.classList.contains("flipped")) return;
    card.classList.add("flipped");

    if (!first) { first = card; return; }

    moves++;
    updateHud();

    if (first.dataset.emoji === card.dataset.emoji) {
      first.classList.add("matched");
      card.classList.add("matched");
      matched++;
      updateHud();
      first = null;
      if (matched === pairs) win();
    } else {
      lock = true;
      const a = first;
      setTimeout(() => {
        a.classList.remove("flipped");
        card.classList.remove("flipped");
        first = null;
        lock = false;
      }, 800);
    }
  }

  function updateHud() {
    document.getElementById("moves").textContent = moves;
    document.getElementById("matches").textContent = matched;
  }

  function win() {
    clearInterval(timer);
    const perfect = pairs;
    const ratio = perfect / moves;
    const stars = ratio > .7 ? "⭐⭐⭐" : ratio > .45 ? "⭐⭐" : "⭐";
    document.getElementById("starRating").textContent = stars;
    document.getElementById("winStats").textContent = `${moves} hamlede, ${seconds} saniyede bitirdin!`;
    document.getElementById("winMsg").textContent = WIN_MSGS[Math.floor(Math.random() * WIN_MSGS.length)];
    document.getElementById("winScreen").classList.add("show");
    confetti();
  }

  function confetti() {
    const items = ["🎉","⭐","💖","✨","🌟","🎊","👑","🦄"];
    for (let i = 0; i < 60; i++) {
      setTimeout(() => {
        const c = document.createElement("div");
        c.className = "confetti";
        c.textContent = items[Math.floor(Math.random() * items.length)];
        c.style.left = Math.random() * 100 + "vw";
        c.style.animationDuration = (Math.random() * 2 + 2) + "s";
        document.body.appendChild(c);
        setTimeout(() => c.remove(), 4500);
      }, i * 50);
    }
  }

  startGame();
</script>
<script>
if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js').catch(function(){}); }
</script>
</body>
</html>
