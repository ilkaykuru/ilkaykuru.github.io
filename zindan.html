<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Zindan 🗡️</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="theme-color" content="#2b1055">

<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; -webkit-user-select:none; user-select:none; touch-action:manipulation; font-family:'Segoe UI',system-ui,sans-serif; }
  body { min-height:100vh; min-height:100dvh; background:#0c0a14; color:#ddd;
    display:flex; flex-direction:column; align-items:center; padding:6px; }
  .home-btn { position:fixed; top:8px; left:10px; z-index:30; border-radius:14px; padding:8px 13px; font-size:.95rem;
    font-weight:bold; background:rgba(255,255,255,.92); color:#2a1f3d; box-shadow:0 4px 12px rgba(0,0,0,.5); text-decoration:none; }
  .hud { display:flex; gap:6px; flex-wrap:wrap; justify-content:center; margin:40px 0 6px; font-size:.85rem; }
  .hud div { background:rgba(255,255,255,.1); border-radius:10px; padding:5px 10px; font-weight:bold; }
  .hpbar { width:min(94vw,520px); height:14px; background:#3a1f1f; border-radius:8px; overflow:hidden; margin-bottom:6px; }
  .hpbar div { height:100%; background:linear-gradient(90deg,#d23c3c,#e57373); transition:width .3s; }
  canvas { background:#0c0a14; border-radius:12px; box-shadow:0 10px 30px rgba(0,0,0,.6); }
  #log { width:min(94vw,520px); height:64px; overflow-y:auto; background:rgba(255,255,255,.06); border-radius:10px;
    padding:6px 10px; font-size:.78rem; line-height:1.5; margin-top:6px; }
  #log .good { color:#81c784; } #log .bad { color:#e57373; } #log .item { color:#ffd54f; }
  .controls { display:flex; gap:14px; margin-top:8px; align-items:center; }
  .pad { display:grid; grid-template-columns:repeat(3,58px); grid-template-rows:repeat(3,52px); gap:5px; }
  .pad button { border:none; border-radius:12px; font-size:1.3rem; cursor:pointer;
    background:rgba(255,255,255,.14); color:#fff; }
  .pad button:active { background:rgba(255,255,255,.35); }
  .pad .u{grid-column:2;grid-row:1} .pad .l{grid-column:1;grid-row:2} .pad .w{grid-column:2;grid-row:2}
  .pad .r{grid-column:3;grid-row:2} .pad .d{grid-column:2;grid-row:3}
  .acts { display:flex; flex-direction:column; gap:6px; }
  .acts button { border:none; border-radius:12px; padding:11px 16px; font-weight:bold; font-size:.9rem;
    cursor:pointer; background:rgba(255,255,255,.16); color:#fff; }
  .acts button.gold { background:linear-gradient(135deg,#ffd93d,#ff9a3d); color:#5b3a00; }
  .screen { position:fixed; inset:0; background:rgba(8,6,15,.95); backdrop-filter:blur(6px); display:none;
    flex-direction:column; align-items:center; justify-content:center; z-index:40; text-align:center; padding:22px; }
  .screen.show { display:flex; }
  .screen h2 { font-size:1.9rem; margin-bottom:10px; }
  .screen p { font-size:1rem; margin:4px 0; max-width:420px; }
  .screen button { margin-top:14px; border:none; border-radius:14px; padding:13px 28px; font-weight:bold; font-size:1.05rem;
    cursor:pointer; background:linear-gradient(135deg,#ffd93d,#ff9a3d); color:#5b3a00; }
  #invPanel { position:fixed; inset:0; background:rgba(8,6,15,.92); display:none; flex-direction:column;
    align-items:center; justify-content:center; z-index:35; padding:18px; }
  #invPanel.show { display:flex; }
  #invPanel .box { background:#1d1830; border-radius:18px; padding:18px; width:min(92vw,420px); max-height:80vh; overflow-y:auto; }
  #invPanel h3 { margin-bottom:10px; color:#ffd54f; }
  .inv-item { display:flex; align-items:center; gap:10px; padding:8px; border-radius:10px; margin-bottom:6px;
    background:rgba(255,255,255,.07); }
  .inv-item .ic { font-size:1.5rem; }
  .inv-item .info { flex:1; text-align:left; font-size:.85rem; }
  .inv-item button { border:none; border-radius:9px; padding:7px 13px; font-weight:bold; cursor:pointer;
    background:#84d9a1; color:#053; font-size:.8rem; }
  .equip { font-size:.82rem; margin-bottom:10px; color:#aaa; }
</style>
</head>
<body>
<a class="home-btn" href="index.html">🏠 Menü</a>
<div class="hud">
  <div>🏰 Kat <span id="floor">1</span></div>
  <div>⭐ Sv.<span id="plvl">1</span></div>
  <div>✨ <span id="xp">0</span>/<span id="xpNext">20</span></div>
  <div>⚔️ <span id="atk">5</span></div>
  <div>🛡️ <span id="def">1</span></div>
  <div>💰 <span id="gold">0</span></div>
</div>
<div class="hpbar"><div id="hpFill" style="width:100%"></div></div>
<canvas id="cv"></canvas>
<div id="log"></div>
<div class="controls">
  <div class="pad">
    <button class="u">⬆️</button><button class="l">⬅️</button>
    <button class="w">⏳</button><button class="r">➡️</button>
    <button class="d">⬇️</button>
  </div>
  <div class="acts">
    <button class="gold" id="invBtn">🎒 Çanta</button>
    <button id="descendBtn" style="display:none">🪜 Aşağı İn</button>
  </div>
</div>

<div id="invPanel">
  <div class="box">
    <h3>🎒 Çanta</h3>
    <div class="equip" id="equipInfo"></div>
    <div id="invList"></div>
    <button class="screen-btn" style="margin-top:8px;border:none;border-radius:12px;padding:10px 22px;font-weight:bold;cursor:pointer;background:#ffd93d;color:#5b3a00" onclick="closeInv()">Kapat</button>
  </div>
</div>

<div class="screen show" id="introScreen">
  <h2>🗡️ Zindan</h2>
  <p>8 katlı zindanın dibindeki Ejderhayı yen! Her kat rastgele üretilir.</p>
  <p style="opacity:.7;font-size:.85rem">D-pad ile yürü · düşmana doğru yürü = saldır · ⏳ = bekle<br>İksir topla, ekipman kuşan, seviye atla.</p>
  <button onclick="newRun()">⚔️ Maceraya Başla</button>
</div>
<div class="screen" id="deadScreen">
  <h2>💀 Öldün!</h2>
  <p id="deadMsg"></p>
  <button onclick="newRun()">🔄 Yeni Macera</button>
</div>
<div class="screen" id="winScreen">
  <h2>🏆 EJDERHAYI YENDİN!</h2>
  <p id="winMsg"></p>
  <button onclick="newRun()">🔄 Tekrar Oyna</button>
</div>

<script>
/* ============ ZİNDAN ÜRETİCİ ============ */
const GEN = (() => {
  const W = 36, H = 24;

  function rng(seed) {
    let s = seed >>> 0;
    return () => { s = (s * 1103515245 + 12345) & 0x7fffffff; return s / 0x7fffffff; };
  }

  function generate(seedVal) {
    const rnd = rng(seedVal);
    const ri = n => Math.floor(rnd() * n);
    for (let attempt = 0; attempt < 50; attempt++) {
      const map = Array.from({length:H}, () => new Array(W).fill('#'));
      const rooms = [];
      const nRooms = 6 + ri(4);
      for (let i = 0; i < nRooms * 6 && rooms.length < nRooms; i++) {
        const w = 4 + ri(6), h = 3 + ri(4);
        const x = 1 + ri(W - w - 2), y = 1 + ri(H - h - 2);
        if (rooms.some(r => x < r.x + r.w + 1 && x + w + 1 > r.x && y < r.y + r.h + 1 && y + h + 1 > r.y)) continue;
        rooms.push({x, y, w, h, cx: x + (w>>1), cy: y + (h>>1)});
        for (let yy = y; yy < y+h; yy++) for (let xx = x; xx < x+w; xx++) map[yy][xx] = '.';
      }
      if (rooms.length < 4) continue;
      // koridorlar: ardışık odaları L şeklinde bağla
      for (let i = 1; i < rooms.length; i++) {
        const a = rooms[i-1], b = rooms[i];
        let x = a.cx, y = a.cy;
        while (x !== b.cx) { map[y][x] = '.'; x += Math.sign(b.cx - x); }
        while (y !== b.cy) { map[y][x] = '.'; y += Math.sign(b.cy - y); }
        map[y][x] = '.';
      }
      // bağlantı kontrolü (flood)
      const start = rooms[0];
      const seen = new Set([start.cx + ',' + start.cy]);
      const stack = [[start.cx, start.cy]];
      while (stack.length) {
        const [x, y] = stack.pop();
        for (const [dx,dy] of [[0,1],[0,-1],[1,0],[-1,0]]) {
          const nx = x+dx, ny = y+dy;
          if (nx<0||ny<0||nx>=W||ny>=H) continue;
          const k = nx+','+ny;
          if (map[ny][nx] === '.' && !seen.has(k)) { seen.add(k); stack.push([nx,ny]); }
        }
      }
      let floorCount = 0;
      for (let y = 0; y < H; y++) for (let x = 0; x < W; x++) if (map[y][x] === '.') floorCount++;
      if (seen.size !== floorCount) continue; // bağlı değil, tekrar
      return { map, rooms, W, H };
    }
    return null;
  }

  return { generate, W, H };
})();

/* ============ OYUN ============ */
const cv = document.getElementById('cv'), ctx = cv.getContext('2d');
const VIEW_W = 17, VIEW_H = 11; // görünür alan (tek sayı = merkezde oyuncu)
let TILE = 28;

function sizeCanvas() {
  TILE = Math.max(20, Math.min(34, Math.floor(Math.min((window.innerWidth-12)/VIEW_W, (window.innerHeight-330)/VIEW_H))));
  cv.width = VIEW_W * TILE; cv.height = VIEW_H * TILE;
}

const ENEMY_TYPES = [
  { em:'🦇', name:'Yarasa',  hp:8,  atk:3,  xp:6,  minF:1 },
  { em:'🐀', name:'Sıçan',   hp:12, atk:4,  xp:8,  minF:1 },
  { em:'💀', name:'İskelet', hp:18, atk:6,  xp:14, minF:2 },
  { em:'🧟', name:'Zombi',   hp:26, atk:8,  xp:20, minF:3 },
  { em:'👻', name:'Hayalet', hp:22, atk:11, xp:26, minF:4 },
  { em:'🧌', name:'Trol',    hp:42, atk:13, xp:38, minF:5 },
  { em:'😈', name:'İblis',   hp:55, atk:17, xp:55, minF:6 }
];
const WEAPONS = [
  { em:'🗡️', name:'Hançer', atk:2 }, { em:'⚔️', name:'Kılıç', atk:5 },
  { em:'🪓', name:'Balta', atk:8 }, { em:'🔱', name:'Mızrak', atk:12 }, { em:'⚡', name:'Yıldırım Kılıcı', atk:17 }
];
const ARMORS = [
  { em:'🧥', name:'Deri Zırh', def:1 }, { em:'🦺', name:'Zincir Zırh', def:3 },
  { em:'🛡️', name:'Plaka Zırh', def:5 }, { em:'💠', name:'Kristal Zırh', def:8 }
];

let P, floor, level, enemies, items, stairs, seen, visible, gameOn = false, turnLock = false;

function newRun() {
  P = { x:0, y:0, hp:30, maxHp:30, baseAtk:5, baseDef:1, lvl:1, xp:0, xpNext:20, gold:0,
    weapon:null, armor:null, inv:[{type:'potion', em:'🧪', name:'Küçük İksir', heal:15}] };
  floor = 1;
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('show'));
  document.getElementById('log').innerHTML = '';
  log('Zindana giriyorsun... Dikkatli ol!', 'item');
  gameOn = true;
  buildFloor();
}
window.newRun = newRun;

function buildFloor() {
  level = GEN.generate(Date.now() + floor * 7919 + Math.floor(Math.random()*99999));
  const rooms = level.rooms;
  P.x = rooms[0].cx; P.y = rooms[0].cy;
  // merdiven son odada
  const last = rooms[rooms.length-1];
  stairs = { x: last.cx, y: last.cy };
  // düşmanlar
  enemies = [];
  const pool = ENEMY_TYPES.filter(e => e.minF <= floor && e.minF >= Math.max(1, floor - 3));
  const count = 4 + floor;
  for (let i = 0; i < count; i++) {
    const room = rooms[1 + Math.floor(Math.random() * (rooms.length-1))];
    const ex = room.x + Math.floor(Math.random()*room.w);
    const ey = room.y + Math.floor(Math.random()*room.h);
    if (enemies.some(e => e.x === ex && e.y === ey) || (ex === stairs.x && ey === stairs.y)) continue;
    const t = pool[Math.floor(Math.random()*pool.length)];
    const sc = 1 + (floor-1) * 0.15;
    enemies.push({ ...t, x:ex, y:ey, hp: Math.round(t.hp*sc), maxHp: Math.round(t.hp*sc),
      atk: Math.round(t.atk*sc), xp: Math.round(t.xp*sc), awake:false });
  }
  // 8. katta boss
  if (floor === 8) {
    const mid = rooms[rooms.length-1];
    enemies.push({ em:'🐲', name:'EJDERHA', x: mid.cx, y: Math.max(mid.y, mid.cy-1),
      hp:160, maxHp:160, atk:22, xp:0, awake:false, boss:true });
  }
  // eşyalar
  items = [];
  const drop = (type, payload) => {
    for (let tries = 0; tries < 30; tries++) {
      const room = rooms[Math.floor(Math.random()*rooms.length)];
      const ix = room.x + Math.floor(Math.random()*room.w);
      const iy = room.y + Math.floor(Math.random()*room.h);
      if ((ix === P.x && iy === P.y) || items.some(i => i.x === ix && i.y === iy)) continue;
      items.push({ x:ix, y:iy, type, ...payload });
      return;
    }
  };
  for (let i = 0; i < 2 + Math.floor(Math.random()*2); i++)
    drop('potion', { em:'🧪', name:'İksir', heal: 12 + floor*3 });
  for (let i = 0; i < 2; i++)
    drop('gold', { em:'💰', name:'Altın', amt: 5 + Math.floor(Math.random()*10) + floor*2 });
  if (Math.random() < 0.75) {
    const wi = Math.min(WEAPONS.length-1, Math.floor((floor-1)/2) + (Math.random()<.3?1:0));
    drop('weapon', { ...WEAPONS[wi] });
  }
  if (Math.random() < 0.6) {
    const ai = Math.min(ARMORS.length-1, Math.floor((floor-1)/2));
    drop('armor', { ...ARMORS[ai] });
  }
  // görüş
  seen = Array.from({length:level.H}, () => new Array(level.W).fill(false));
  computeFov();
  updateHud(); render();
  log(`🏰 Kat ${floor}` + (floor === 8 ? ' — EJDERHANIN İNİ! 🐲' : ''), floor === 8 ? 'bad' : 'item');
}

/* ---------- görüş (basit raycast) ---------- */
function computeFov() {
  visible = Array.from({length:level.H}, () => new Array(level.W).fill(false));
  const R = 6;
  visible[P.y][P.x] = true; seen[P.y][P.x] = true;
  for (let a = 0; a < 360; a += 3) {
    const dx = Math.cos(a*Math.PI/180), dy = Math.sin(a*Math.PI/180);
    let x = P.x + 0.5, y = P.y + 0.5;
    for (let d = 0; d < R; d++) {
      x += dx; y += dy;
      const tx = x|0, ty = y|0;
      if (tx<0||ty<0||tx>=level.W||ty>=level.H) break;
      visible[ty][tx] = true; seen[ty][tx] = true;
      if (level.map[ty][tx] === '#') break;
    }
  }
}

/* ---------- tur ---------- */
function tryMove(dx, dy) {
  if (!gameOn || turnLock) return;
  const nx = P.x + dx, ny = P.y + dy;
  if (nx<0||ny<0||nx>=level.W||ny>=level.H) return;
  if (level.map[ny][nx] === '#') return;
  const foe = enemies.find(e => e.x === nx && e.y === ny);
  if (foe) { attack(foe); return; }
  P.x = nx; P.y = ny;
  // eşya al
  const it = items.findIndex(i => i.x === nx && i.y === ny);
  if (it >= 0) pickUp(items.splice(it, 1)[0]);
  endTurn();
}

function attack(foe) {
  const atk = totalAtk();
  const dmg = Math.max(1, atk + Math.floor(Math.random()*4) - 1);
  foe.hp -= dmg;
  log(`⚔️ ${foe.name}'a ${dmg} hasar!`, 'good');
  if (foe.hp <= 0) {
    log(`💥 ${foe.name} öldü!` + (foe.boss ? '' : ` +${foe.xp} XP`), 'good');
    enemies = enemies.filter(e => e !== foe);
    if (foe.boss) { winGame(); return; }
    gainXp(foe.xp);
    if (Math.random() < 0.25) { P.gold += 3 + Math.floor(Math.random()*6); updateHud(); }
  }
  endTurn();
}

function gainXp(n) {
  P.xp += n;
  while (P.xp >= P.xpNext) {
    P.xp -= P.xpNext;
    P.lvl++;
    P.xpNext = Math.round(P.xpNext * 1.45);
    P.maxHp += 8; P.hp = P.maxHp;
    P.baseAtk += 2; P.baseDef += 1;
    log(`🌟 SEVİYE ${P.lvl}! Can yenilendi, güç arttı!`, 'item');
  }
  updateHud();
}

function pickUp(it) {
  if (it.type === 'gold') { P.gold += it.amt; log(`💰 ${it.amt} altın!`, 'item'); }
  else if (it.type === 'potion') { P.inv.push(it); log(`🧪 ${it.name} alındı (çantada)`, 'item'); }
  else if (it.type === 'weapon') { P.inv.push(it); log(`${it.em} ${it.name} bulundu!`, 'item'); }
  else if (it.type === 'armor') { P.inv.push(it); log(`${it.em} ${it.name} bulundu!`, 'item'); }
  updateHud();
}

function endTurn() {
  turnLock = true;
  // düşman turları
  for (const e of enemies) {
    const dist = Math.abs(e.x - P.x) + Math.abs(e.y - P.y);
    if (!e.awake) {
      if (dist <= 6 && visible[e.y] && visible[e.y][e.x]) { e.awake = true; }
      else continue;
    }
    if (dist === 1) {
      const dmg = Math.max(1, e.atk - totalDef() + Math.floor(Math.random()*3) - 1);
      P.hp -= dmg;
      log(`${e.em} ${e.name} sana ${dmg} hasar verdi!`, 'bad');
      if (P.hp <= 0) { die(e); return; }
    } else if (dist <= 9) {
      // basit kovalama: oyuncuya yaklaşan geçerli adım
      const opts = [[Math.sign(P.x-e.x),0],[0,Math.sign(P.y-e.y)]].filter(([dx,dy]) => dx||dy);
      if (Math.random() < 0.5) opts.reverse();
      for (const [dx,dy] of opts) {
        const nx = e.x+dx, ny = e.y+dy;
        if (level.map[ny][nx] === '#') continue;
        if (nx === P.x && ny === P.y) continue;
        if (enemies.some(o => o !== e && o.x === nx && o.y === ny)) continue;
        e.x = nx; e.y = ny; break;
      }
    }
  }
  computeFov();
  updateHud(); render();
  turnLock = false;
}

function wait() { if (gameOn && !turnLock) { log('⏳ Bekledin.', ''); endTurn(); } }

function descend() {
  if (P.x === stairs.x && P.y === stairs.y) {
    floor++;
    if (floor > 8) return; // olmaz ama güvenlik
    buildFloor();
  }
}

function totalAtk() { return P.baseAtk + (P.weapon ? P.weapon.atk : 0); }
function totalDef() { return P.baseDef + (P.armor ? P.armor.def : 0); }

function die(e) {
  gameOn = false;
  document.getElementById('deadMsg').textContent =
    `${e.em} ${e.name} seni ${floor}. katta yendi. Seviye ${P.lvl}'e ulaşmıştın, ${P.gold} altın topladın.`;
  document.getElementById('deadScreen').classList.add('show');
}

function winGame() {
  gameOn = false;
  document.getElementById('winMsg').textContent =
    `Seviye ${P.lvl} kahraman olarak Ejderhayı devirdin! ${P.gold} altınla zindandan çıktın. 👑`;
  document.getElementById('winScreen').classList.add('show');
}

/* ---------- envanter ---------- */
function openInv() {
  const list = document.getElementById('invList'); list.innerHTML = '';
  document.getElementById('equipInfo').innerHTML =
    `Silah: ${P.weapon ? P.weapon.em + ' ' + P.weapon.name + ' (+' + P.weapon.atk + ')' : '— yok'} · ` +
    `Zırh: ${P.armor ? P.armor.em + ' ' + P.armor.name + ' (+' + P.armor.def + ')' : '— yok'}`;
  if (!P.inv.length) list.innerHTML = '<p style="opacity:.6;font-size:.85rem">Çanta boş.</p>';
  P.inv.forEach((it, i) => {
    const d = document.createElement('div'); d.className = 'inv-item';
    let desc = '', btnTxt = '';
    if (it.type === 'potion') { desc = `+${it.heal} can`; btnTxt = 'İç'; }
    else if (it.type === 'weapon') { desc = `Saldırı +${it.atk}`; btnTxt = 'Kuşan'; }
    else if (it.type === 'armor') { desc = `Savunma +${it.def}`; btnTxt = 'Giy'; }
    d.innerHTML = `<span class="ic">${it.em}</span><span class="info"><b>${it.name}</b><br>${desc}</span>`;
    const b = document.createElement('button'); b.textContent = btnTxt;
    b.onclick = () => useItem(i);
    d.appendChild(b);
    list.appendChild(d);
  });
  document.getElementById('invPanel').classList.add('show');
}
function closeInv() { document.getElementById('invPanel').classList.remove('show'); }
window.closeInv = closeInv;

function useItem(i) {
  const it = P.inv[i];
  if (it.type === 'potion') {
    P.hp = Math.min(P.maxHp, P.hp + it.heal);
    log(`🧪 İksir içtin: +${it.heal} can`, 'good');
    P.inv.splice(i, 1);
  } else if (it.type === 'weapon') {
    if (P.weapon) P.inv.push(P.weapon);
    P.weapon = it; P.inv.splice(P.inv.indexOf(it), 1);
    log(`${it.em} ${it.name} kuşandın!`, 'item');
  } else if (it.type === 'armor') {
    if (P.armor) P.inv.push(P.armor);
    P.armor = it; P.inv.splice(P.inv.indexOf(it), 1);
    log(`${it.em} ${it.name} giydin!`, 'item');
  }
  updateHud(); openInv();
}

/* ---------- hud + log ---------- */
function updateHud() {
  document.getElementById('floor').textContent = floor;
  document.getElementById('plvl').textContent = P.lvl;
  document.getElementById('xp').textContent = P.xp;
  document.getElementById('xpNext').textContent = P.xpNext;
  document.getElementById('atk').textContent = totalAtk();
  document.getElementById('def').textContent = totalDef();
  document.getElementById('gold').textContent = P.gold;
  document.getElementById('hpFill').style.width = Math.max(0, P.hp / P.maxHp * 100) + '%';
  document.getElementById('descendBtn').style.display =
    (gameOn && P.x === stairs.x && P.y === stairs.y && floor < 8) ? 'block' : 'none';
}

function log(msg, cls) {
  const el = document.getElementById('log');
  el.innerHTML += `<div class="${cls||''}">${msg}</div>`;
  el.scrollTop = el.scrollHeight;
}

/* ---------- çizim ---------- */
function render() {
  ctx.clearRect(0, 0, cv.width, cv.height);
  const ox = P.x - (VIEW_W>>1), oy = P.y - (VIEW_H>>1);
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  for (let vy = 0; vy < VIEW_H; vy++) for (let vx = 0; vx < VIEW_W; vx++) {
    const x = ox + vx, y = oy + vy;
    if (x<0||y<0||x>=level.W||y>=level.H) continue;
    if (!seen[y][x]) continue;
    const lit = visible[y][x];
    const px = vx*TILE, py = vy*TILE;
    if (level.map[y][x] === '#') {
      ctx.fillStyle = lit ? '#3d3454' : '#221d30';
      ctx.fillRect(px, py, TILE, TILE);
      ctx.fillStyle = lit ? '#2a2440' : '#191525';
      ctx.fillRect(px+2, py+2, TILE-4, TILE-4);
    } else {
      ctx.fillStyle = lit ? '#1b1726' : '#120f1a';
      ctx.fillRect(px, py, TILE, TILE);
    }
  }
  const drawAt = (x, y, em, size) => {
    const vx = x - ox, vy = y - oy;
    if (vx<0||vy<0||vx>=VIEW_W||vy>=VIEW_H) return;
    ctx.font = (size||TILE*0.72) + 'px serif';
    ctx.fillText(em, vx*TILE + TILE/2, vy*TILE + TILE/2 + 1);
  };
  // merdiven
  if (seen[stairs.y][stairs.x]) drawAt(stairs.x, stairs.y, '🪜');
  // eşyalar
  items.forEach(i => { if (visible[i.y][i.x]) drawAt(i.x, i.y, i.em); });
  // düşmanlar + can barı
  enemies.forEach(e => {
    if (!visible[e.y][e.x]) return;
    drawAt(e.x, e.y, e.em, e.boss ? TILE*0.95 : undefined);
    const vx = e.x - ox, vy = e.y - oy;
    const w = TILE-8, ratio = Math.max(0, e.hp/e.maxHp);
    ctx.fillStyle = '#000'; ctx.fillRect(vx*TILE+4, vy*TILE+1, w, 3);
    ctx.fillStyle = ratio > .5 ? '#66bb6a' : '#ef5350';
    ctx.fillRect(vx*TILE+4, vy*TILE+1, w*ratio, 3);
  });
  // oyuncu
  drawAt(P.x, P.y, '🧝');
}

/* ---------- kontroller ---------- */
document.querySelector('.pad .u').onclick = () => tryMove(0,-1);
document.querySelector('.pad .d').onclick = () => tryMove(0,1);
document.querySelector('.pad .l').onclick = () => tryMove(-1,0);
document.querySelector('.pad .r').onclick = () => tryMove(1,0);
document.querySelector('.pad .w').onclick = wait;
document.getElementById('invBtn').onclick = openInv;
document.getElementById('descendBtn').onclick = descend;

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowUp') tryMove(0,-1);
  else if (e.key === 'ArrowDown') tryMove(0,1);
  else if (e.key === 'ArrowLeft') tryMove(-1,0);
  else if (e.key === 'ArrowRight') tryMove(1,0);
  else if (e.key === ' ') { e.preventDefault(); wait(); }
  else if (e.key === 'i') openInv();
  else if (e.key === 'Enter') descend();
});

// kaydırma
let tsx, tsy;
cv.addEventListener('touchstart', e => { tsx = e.touches[0].clientX; tsy = e.touches[0].clientY; }, {passive:true});
cv.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - tsx, dy = e.changedTouches[0].clientY - tsy;
  if (Math.abs(dx) < 18 && Math.abs(dy) < 18) return;
  if (Math.abs(dx) > Math.abs(dy)) tryMove(Math.sign(dx), 0);
  else tryMove(0, Math.sign(dy));
}, {passive:true});

sizeCanvas();
window.addEventListener('resize', () => { sizeCanvas(); if (level) render(); });

if (typeof module !== 'undefined') module.exports = GEN;
</script>
<script>
if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js').catch(function(){}); }
</script>
</body>
