<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Uzay Yılanı 🐍</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; -webkit-user-select:none; user-select:none; touch-action:manipulation; }
  body {
    font-family:'Comic Sans MS','Segoe UI',sans-serif;
    min-height:100vh; min-height:100dvh;
    background:linear-gradient(160deg,#1a0b3d 0%,#3d2b7a 60%,#6b4aa0 100%);
    color:#fff; display:flex; flex-direction:column; align-items:center; padding:12px;
  }
  .home-btn { position:fixed; top:10px; left:12px; z-index:8; border-radius:16px; padding:10px 16px;
    font-size:1.05rem; font-weight:bold; background:rgba(255,255,255,.92); color:#6b4a8a;
    box-shadow:0 4px 12px rgba(0,0,0,.2); text-decoration:none; font-family:inherit; }
  h1 { font-size:clamp(1.3rem,4.5vw,2rem); margin:42px 0 8px; text-shadow:0 3px 10px rgba(0,0,0,.4); }
  .hud { display:flex; gap:10px; margin-bottom:10px; }
  .hud div { background:rgba(255,255,255,.18); border-radius:14px; padding:8px 16px; font-weight:bold; }
  canvas { background:rgba(10,5,30,.55); border-radius:18px; box-shadow:0 8px 24px rgba(0,0,0,.35);
    width:min(92vw,440px); height:min(92vw,440px); }
  .levels { display:flex; gap:8px; margin:10px 0; }
  .levels button { border:none; border-radius:12px; padding:9px 18px; font-family:inherit; font-weight:bold;
    font-size:.95rem; cursor:pointer; background:rgba(255,255,255,.25); color:#fff; }
  .levels button.active { background:#ffd93d; color:#5b3a00; }
  .pad { display:grid; grid-template-columns:repeat(3,64px); grid-template-rows:repeat(2,56px); gap:6px; margin-top:8px; }
  .pad button { border:none; border-radius:14px; font-size:1.5rem; cursor:pointer;
    background:rgba(255,255,255,.22); color:#fff; box-shadow:0 3px 8px rgba(0,0,0,.25); }
  .pad button:active { background:rgba(255,255,255,.45); }
  .pad .up { grid-column:2; grid-row:1; } .pad .left { grid-column:1; grid-row:2; }
  .pad .down { grid-column:2; grid-row:2; } .pad .right { grid-column:3; grid-row:2; }
  #over { position:fixed; inset:0; background:rgba(15,5,40,.88); display:none; flex-direction:column;
    align-items:center; justify-content:center; z-index:10; text-align:center; padding:20px; }
  #over.show { display:flex; }
  #over h2 { font-size:2rem; margin-bottom:10px; }
  #over p { font-size:1.15rem; margin:4px 0; }
  #over button { margin-top:16px; border:none; border-radius:16px; padding:14px 32px; font-family:inherit;
    font-size:1.15rem; font-weight:bold; cursor:pointer; background:linear-gradient(135deg,#ffd93d,#ff9a3d); color:#5b3a00; }
</style>
</head>
<body>
<a class="home-btn" href="index.html">🏠 Menü</a>
<h1>🐍 Uzay Yılanı</h1>
<div class="levels">
  <button data-ms="200" class="active">Kolay</button>
  <button data-ms="150">Orta</button>
  <button data-ms="105">Zor</button>
</div>
<div class="hud">
  <div>⭐ Puan: <span id="score">0</span></div>
  <div>🏆 Rekor: <span id="best">0</span></div>
</div>
<canvas id="cv" width="440" height="440"></canvas>
<div class="pad">
  <button class="up">⬆️</button>
  <button class="left">⬅️</button>
  <button class="down">⬇️</button>
  <button class="right">➡️</button>
</div>
<div id="over">
  <h2 id="overTitle">💥 Oyun Bitti!</h2>
  <p>⭐ Puanın: <span id="finalScore">0</span></p>
  <p id="overMsg"></p>
  <button onclick="start()">🔄 Tekrar Oyna</button>
</div>
<script>
  const cv = document.getElementById("cv"), ctx = cv.getContext("2d");
  const N = 17, CELL = cv.width / N;
  let snake, dir, nextDir, food, score = 0, best = 0, timer = null, baseMs = 200, alive = false;

  try { best = +localStorage.getItem("yilanBest") || 0; } catch(e) {}
  document.getElementById("best").textContent = best;

  const MSGS = ["Yılanın yıldızlara doydu! 🌟","Galaktik yılan terbiyecisi Eylül! 🐍","Bir dahaki sefere daha uzun! 💪"];

  document.querySelectorAll(".levels button").forEach(b => b.onclick = () => {
    document.querySelector(".levels .active").classList.remove("active");
    b.classList.add("active"); baseMs = +b.dataset.ms; start();
  });

  function start() {
    document.getElementById("over").classList.remove("show");
    snake = [{x:8,y:8},{x:7,y:8},{x:6,y:8}];
    dir = {x:1,y:0}; nextDir = dir; score = 0; alive = true;
    document.getElementById("score").textContent = 0;
    placeFood(); schedule();
  }

  function schedule() {
    clearInterval(timer);
    const ms = Math.max(60, baseMs - score * 3);
    timer = setInterval(tick, ms);
  }

  function placeFood() {
    do { food = { x: Math.floor(Math.random()*N), y: Math.floor(Math.random()*N) }; }
    while (snake.some(s => s.x === food.x && s.y === food.y));
  }

  function tick() {
    if (!alive) return;
    dir = nextDir;
    const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };
    if (head.x < 0 || head.y < 0 || head.x >= N || head.y >= N ||
        snake.some(s => s.x === head.x && s.y === head.y)) return gameOver();
    snake.unshift(head);
    if (head.x === food.x && head.y === food.y) {
      score++;
      document.getElementById("score").textContent = score;
      placeFood(); schedule();
    } else snake.pop();
    draw();
  }

  function draw() {
    ctx.clearRect(0,0,cv.width,cv.height);
    // yıldız yemi
    ctx.font = (CELL*0.9) + "px serif";
    ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.fillText("⭐", food.x*CELL + CELL/2, food.y*CELL + CELL/2);
    // yılan
    snake.forEach((s,i) => {
      const t = i / snake.length;
      ctx.fillStyle = `hsl(${280 - t*60}, 80%, ${65 - t*15}%)`;
      const r = CELL*0.46;
      ctx.beginPath();
      ctx.arc(s.x*CELL + CELL/2, s.y*CELL + CELL/2, r, 0, 7);
      ctx.fill();
    });
    // gözler
    const h = snake[0];
    ctx.fillStyle = "#fff";
    ctx.beginPath(); ctx.arc(h.x*CELL+CELL/2-5, h.y*CELL+CELL/2-3, 4, 0, 7); ctx.fill();
    ctx.beginPath(); ctx.arc(h.x*CELL+CELL/2+5, h.y*CELL+CELL/2-3, 4, 0, 7); ctx.fill();
    ctx.fillStyle = "#1a0b3d";
    ctx.beginPath(); ctx.arc(h.x*CELL+CELL/2-5, h.y*CELL+CELL/2-3, 2, 0, 7); ctx.fill();
    ctx.beginPath(); ctx.arc(h.x*CELL+CELL/2+5, h.y*CELL+CELL/2-3, 2, 0, 7); ctx.fill();
  }

  function gameOver() {
    alive = false; clearInterval(timer);
    if (score > best) {
      best = score;
      try { localStorage.setItem("yilanBest", best); } catch(e) {}
      document.getElementById("best").textContent = best;
      document.getElementById("overTitle").textContent = "🏆 Yeni Rekor Eylül!";
    } else document.getElementById("overTitle").textContent = "💥 Oyun Bitti!";
    document.getElementById("finalScore").textContent = score;
    document.getElementById("overMsg").textContent = MSGS[Math.floor(Math.random()*MSGS.length)];
    document.getElementById("over").classList.add("show");
  }

  function setDir(x, y) {
    if (x === -dir.x && y === -dir.y) return; // geri dönüş yok
    nextDir = {x, y};
  }

  document.querySelector(".up").onclick = () => setDir(0,-1);
  document.querySelector(".down").onclick = () => setDir(0,1);
  document.querySelector(".left").onclick = () => setDir(-1,0);
  document.querySelector(".right").onclick = () => setDir(1,0);

  document.addEventListener("keydown", e => {
    if (e.key === "ArrowUp") setDir(0,-1);
    else if (e.key === "ArrowDown") setDir(0,1);
    else if (e.key === "ArrowLeft") setDir(-1,0);
    else if (e.key === "ArrowRight") setDir(1,0);
  });

  // kaydırma kontrolü
  let tx = 0, ty = 0;
  cv.addEventListener("touchstart", e => { tx = e.touches[0].clientX; ty = e.touches[0].clientY; }, {passive:true});
  cv.addEventListener("touchend", e => {
    const dx = e.changedTouches[0].clientX - tx, dy = e.changedTouches[0].clientY - ty;
    if (Math.abs(dx) < 20 && Math.abs(dy) < 20) return;
    if (Math.abs(dx) > Math.abs(dy)) setDir(Math.sign(dx), 0);
    else setDir(0, Math.sign(dy));
  }, {passive:true});

  start();
</script>
</body>
</html>
